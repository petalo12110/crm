packages:
  - 'apps/*'
  - 'packages/*'

# Build-script approval (prisma, esbuild, sharp, etc.) lives in the root
# package.json's "pnpm.onlyBuiltDependencies" field — that's what
# pnpm@9.15.9 (pinned via render.yaml's buildCommand) actually reads.
# allowBuilds (this file's modern equivalent) doesn't exist until pnpm
# v10.26+, so it's deliberately not used here while we're pinned to 9.x.
