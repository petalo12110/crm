packages:
  - 'apps/*'
  - 'packages/*'

# Testing this location combined with the confirmed pnpm@9.15.9 pin in
# render.yaml — package.json's "pnpm.onlyBuiltDependencies" has shown the
# "no longer read" deprecation warning even under 9.15.9, so this may be
# the version where the setting actually needs to live here instead.
onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - esbuild
  - msgpackr-extract
  - sharp
