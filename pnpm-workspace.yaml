packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  # Pulled in transitively by @capacitor/assets (apps/web, Android icon
  # generation) — pnpm's build-script-approval gate flagged this the same
  # way it did for prisma/esbuild above. Locally that's just an
  # interactive `pnpm approve-builds` prompt, but Render's build has no
  # terminal to answer a prompt — left unapproved, it would fail the
  # deploy outright instead of just warning.
  sharp: true
